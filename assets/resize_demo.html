<!doctype html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #1a5276, #2ecc71);
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: grid;
    place-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .title-bar {
    -webkit-app-region: drag;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 32px;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    padding-left: 12px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
  }
  .content {
    text-align: center;
  }
  .size {
    font-size: 2.5em;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .hint {
    margin-top: 8px;
    font-size: 0.9em;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="title-bar">Drag to move</div>
  <div class="content">
    <div class="size" id="s">&mdash;</div>
    <div class="hint">Drag edges to resize &middot; Shift locks aspect</div>
  </div>
  <script>
    const s = document.getElementById('s');
    function update() {
      s.textContent = window.innerWidth + ' \u00d7 ' + window.innerHeight;
    }
    window.addEventListener('resize', update);
    update();
  </script>
</body>
</html>
