[package]
name = "bevy_cef_core"
description = "Core library for bevy_cef"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
bevy = { workspace = true }
bevy_remote = { workspace = true }
uuid = { version = "1" }
cef = { workspace = true }
cef-dll-sys = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
async-channel = { workspace = true }
raw-window-handle = { workspace = true }

# `linux/input-event-codes.h` constants (KEY_A etc.) for XKB native key code mapping.
[target.'cfg(target_os = "linux")'.dependencies]
input-linux-sys = { version = "0.9", default-features = false }

[features]
default = []
debug = []