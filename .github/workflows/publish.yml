name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable

      - name: Install alsa and udev
        run: sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev pkg-config

      - name: Publish bevy_cef_core
        run: cargo publish -p bevy_cef_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish bevy_cef_bundle_app
        run: cargo publish -p bevy_cef_bundle_app
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish bevy_cef
        run: |
          for i in 1 2 3 4 5; do
            cargo publish -p bevy_cef && exit 0
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "All attempts failed"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish bevy_cef_render_process
        run: |
          for i in 1 2 3 4 5; do
            cargo publish -p bevy_cef_render_process && exit 0
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "All attempts failed"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish bevy_cef_debug_render_process
        run: |
          for i in 1 2 3 4 5; do
            cargo publish -p bevy_cef_debug_render_process && exit 0
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "All attempts failed"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
