name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Fetch prior PR comments
        run: |
          echo "=== Review bodies ===" > prior-comments.txt
          gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            --jq '.[] | .body // empty' >> prior-comments.txt || echo "WARNING: failed to fetch review bodies" >> prior-comments.txt
          echo "=== Inline review comments ===" >> prior-comments.txt
          gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | .body // empty' >> prior-comments.txt || echo "WARNING: failed to fetch inline review comments" >> prior-comments.txt
          echo "=== Issue comments ===" >> prior-comments.txt
          gh api --paginate "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | .body // empty' >> prior-comments.txt || echo "WARNING: failed to fetch issue comments" >> prior-comments.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write

  post_review:
    runs-on: ubuntu-latest
    needs: codex
    if: ${{ needs.codex.outputs.final_message }}
    permissions:
      pull-requests: write
    steps:
      - name: Post Codex review
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
              event: 'COMMENT',
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true
